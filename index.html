<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>실시간 자막</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FJL6BD9YNR"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-FJL6BD9YNR');
</script>

<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="jamak" />
<style>
  :root {
    --fs: 56px;          /* 글자 크기 (설정에서 변경) */
    --bg: #000;
    --fg: #fff;
    --accent: #4cd964;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: "Apple SD Gothic Neo", "Noto Sans KR", "맑은 고딕", "Malgun Gothic", system-ui, sans-serif;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    /* 안전 영역(노치/제스처바) 고려 */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ===== 자막 영역 ===== */
  #captions {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 0.35em;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  /* 새 글이 아래에서 올라옴(구글 자막 방식). justify-content:flex-end 대신
     맨 위에 자동 여백 스페이서를 둔다 — 그래야 내용이 길어져도 위로 스크롤해
     옛날 자막을 볼 수 있다(flex-end는 넘친 윗부분이 잘려 스크롤 불가). */
  #captions::before {
    content: "";
    margin-top: auto;
  }

  /* #session 은 매 이벤트마다 다시 그려지므로 줄 단위 애니메이션은 두지 않는다(깜빡임 방지). */
  #permanent, #session { display: block; }

  .line {
    font-size: var(--fs);
    line-height: 1.45;
    font-weight: 700;
    letter-spacing: -0.01em;
    word-break: keep-all;
    margin: 0.12em 0;
  }

  .line.interim {
    color: #b8b8b8;   /* 아직 확정 안 된 말은 흐리게 */
    font-weight: 600;
  }

  #hint {
    color: #9a9a9a;
    font-size: calc(var(--fs) * 0.5);
    font-weight: 600;
    text-align: center;
    line-height: 1.5;
  }

  /* ===== 하단 컨트롤 ===== */
  #bar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
    background: #0d0d0d;
    border-top: 1px solid #222;
  }

  button {
    font-family: inherit;
    font-weight: 700;
    border: none;
    border-radius: 18px;
    color: #fff;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.2s ease;
    touch-action: manipulation;
  }
  button:active { transform: scale(0.96); }

  /* 바의 모든 버튼은 같은 크기(동일 너비·높이). */
  #bar button {
    flex: 1 1 0;
    min-width: 0;
    min-height: 80px;
    font-size: 30px;
    padding: 18px 6px;
    background: #2a2a2a;
  }

  /* 자막 시작/멈춤 — 글자 없이 마이크/정지 아이콘만, 색으로 강조.
     (#bar button 보다 우선순위를 높여야 배경색이 적용된다.) */
  #bar #toggle { background: var(--accent); color: #003311; font-size: 36px; }
  #bar #toggle.listening { background: #ff3b30; color: #fff; }

  /* 글자 크기 조절 버튼: '가' + 크고작은 부호 */
  .size-btn { font-weight: 800; line-height: 1; }
  .size-btn .ga { font-size: 24px; }
  #sizeUp .ga { font-size: 32px; }
  #sizeDown .ga { font-size: 18px; }
  .size-btn .pm { font-size: 20px; margin-left: 2px; color: var(--accent); }
  #bar button:disabled { opacity: 0.35; }

  @media (max-width: 380px) {
    #bar button { font-size: 24px; }
    #bar #toggle { font-size: 30px; }
  }

  #ver {
    position: fixed;
    top: 4px;
    right: 8px;
    font-size: 12px;
    color: #5a5a5a;
    z-index: 20;
    pointer-events: none;
  }

  #unsupported {
    display: none;
    padding: 40px 28px;
    font-size: 28px;
    line-height: 1.6;
    text-align: center;
  }
</style>
</head>
<body>

  <div id="ver"></div>

  <div id="captions">
    <div id="hint">아래 <b>🎙️</b> 버튼을 누르고<br>말씀해 주세요.</div>
    <div id="permanent"></div>
    <div id="session"></div>
  </div>

  <div id="unsupported">
    이 브라우저는 음성 인식을 지원하지 않습니다.<br><br>
    안드로이드에서는 <b>크롬(Chrome)</b> 브라우저로 열어 주세요.
  </div>

  <div id="bar">
    <button id="sizeDown" class="icon-btn size-btn" aria-label="글자 작게"><span class="ga">가</span><span class="pm">－</span></button>
    <button id="sizeUp" class="icon-btn size-btn" aria-label="글자 크게"><span class="ga">가</span><span class="pm">＋</span></button>
    <button id="toggle" aria-label="자막 시작">🎙️</button>
    <button id="refreshBtn" class="icon-btn" aria-label="새로고침">🔄</button>
  </div>

<script>
(function () {
  "use strict";

  // 화면 우상단 버전 표시 — 폰이 최신 코드를 받았는지 확인용.
  var APP_VERSION = "v11";
  var verEl = document.getElementById("ver");
  if (verEl) verEl.textContent = APP_VERSION;

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var captions = document.getElementById("captions");
  var hint = document.getElementById("hint");
  var toggle = document.getElementById("toggle");
  var refreshBtn = document.getElementById("refreshBtn");
  var sizeDownBtn = document.getElementById("sizeDown");
  var sizeUpBtn = document.getElementById("sizeUp");

  // 지원하지 않는 브라우저 처리
  if (!SR) {
    document.getElementById("unsupported").style.display = "block";
    document.getElementById("bar").style.display = "none";
    captions.style.display = "none";
    return;
  }

  // ---- 글자 크기(가－/가＋ 스텝) ----
  var SIZES = [40, 56, 76, 100];   // 작게 → 아주 크게 (4단계)
  var sizeIdx = parseInt(localStorage.getItem("vs_sizeidx"), 10);
  if (isNaN(sizeIdx) || sizeIdx < 0 || sizeIdx >= SIZES.length) sizeIdx = 1; // 기본 '보통'
  function applySize() {
    document.documentElement.style.setProperty("--fs", SIZES[sizeIdx] + "px");
    localStorage.setItem("vs_sizeidx", String(sizeIdx));
    document.getElementById("sizeDown").disabled = (sizeIdx === 0);
    document.getElementById("sizeUp").disabled = (sizeIdx === SIZES.length - 1);
  }
  function stepSize(delta) {
    sizeIdx = Math.min(SIZES.length - 1, Math.max(0, sizeIdx + delta));
    applySize();
  }
  applySize();

  // ---- 자막 표시 ----
  // 화면은 두 영역으로 나눈다:
  //   #permanent : 끝난 세션들의 확정 줄(한 번만 추가됨, 안정적).
  //   #session   : 현재 인식 세션. 매 onresult 마다 "통째로 비우고 다시 그린다".
  // 매번 다시 그리므로 같은 결과가 누적·중복될 수 없다(인덱스/카운터에 의존하지 않음).
  // 또 같은 확정 문구가 연속되면(안드로이드의 이중 확정/세션 경계 재인식) 하나로 합친다.
  var permanent = document.getElementById("permanent");
  var session = document.getElementById("session");
  var MAX_LINES = 80;

  function removeHint() { if (hint) { hint.remove(); hint = null; } }
  function scrollToBottom() { captions.scrollTop = captions.scrollHeight; }

  function makeLine(text, isInterim) {
    var div = document.createElement("div");
    div.className = isInterim ? "line interim" : "line";
    div.textContent = text;
    return div;
  }

  function trimPermanent() {
    while (permanent.children.length > MAX_LINES) permanent.removeChild(permanent.firstChild);
  }

  function normSpace(s) { return (s || "").replace(/\s+/g, " ").trim(); }

  // 한쪽이 다른 쪽의 앞부분(접두사)이면 "자라는 같은 발화"로 본다.
  function isGrowth(prev, cur) {
    prev = normSpace(prev); cur = normSpace(cur);
    if (!prev || !cur) return false;
    return cur === prev || cur.indexOf(prev) === 0 || prev.indexOf(cur) === 0;
  }

  // 확정 텍스트를 영구 영역에 올린다. 직전 줄과 같은(자라는) 발화면 더 긴 것으로 "교체",
  // 아니면 새 줄. → 안드로이드가 세션마다 앞부분을 다시 인식해 "안녕 / 안녕 이번에는 / ..."
  // 식으로 점점 길어지며 쌓이는 것을 한 줄로 합친다.
  function commitLine(text) {
    text = normSpace(text);
    if (!text) return;
    var last = permanent.lastElementChild;
    if (last && isGrowth(last.textContent, text)) {
      if (text.length >= normSpace(last.textContent).length) last.textContent = text;
    } else {
      permanent.appendChild(makeLine(text, false));
      trimPermanent();
    }
    scrollToBottom();
  }

  // 매 onresult: 확정 결과는 즉시 영구 영역으로(합치기), 미확정(interim)은 아래 흐린 한 줄로만.
  function renderSession(results) {
    removeHint();
    var interim = "";
    for (var i = 0; i < results.length; i++) {
      var t = results[i][0].transcript;
      if (!t) continue;
      if (results[i].isFinal) commitLine(t);
      else interim += t;
    }
    session.textContent = "";
    if (normSpace(interim)) session.appendChild(makeLine(normSpace(interim), true));
    scrollToBottom();
  }

  // 세션 종료: 남은 미확정 텍스트를 확정으로 보존(합치기) 후 흐린 줄 제거.
  function foldSession() {
    var live = session.querySelector(".line.interim");
    if (live) commitLine(live.textContent);
    session.textContent = "";
    scrollToBottom();
  }

  // ---- 음성 인식 ----
  var listening = false;       // 사용자가 켜둔 상태인지
  var recognition = null;

  // 세션마다 새 객체를 만든다 → results 배열이 항상 깨끗해 세션 간 중복이 원천 차단된다.
  function buildRecognition() {
    var r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = "ko-KR";
    r.maxAlternatives = 1;

    r.onresult = function (event) { renderSession(event.results); };

    r.onerror = function (e) {
      if (e.error === "not-allowed" || e.error === "service-not-allowed") {
        listening = false;
        updateButton();
        removeHint();
        permanent.appendChild(makeLine("⚠️ 마이크 권한을 허용해 주세요.", false));
        scrollToBottom();
      }
      // no-speech, aborted, network 등은 onend 의 자동 재시작이 처리.
    };

    // 안드로이드 크롬은 잠깐 말이 없으면 onend 가 호출됨 → 켜둔 상태면 새 객체로 재시작.
    r.onend = function () {
      foldSession();
      if (listening) {
        recognition = buildRecognition();
        try { recognition.start(); } catch (err) {}
      }
    };
    return r;
  }

  function start() {
    listening = true;
    recognition = buildRecognition();
    try { recognition.start(); } catch (err) {}
    updateButton();
    requestWakeLock();   // 화면 꺼짐 방지 시도(지원 시)
  }

  function stop() {
    listening = false;
    if (recognition) { try { recognition.stop(); } catch (err) {} }
    foldSession();
    updateButton();
    releaseWakeLock();
  }

  function updateButton() {
    if (listening) {
      toggle.textContent = "⏹";
      toggle.setAttribute("aria-label", "자막 멈춤");
      toggle.classList.add("listening");
    } else {
      toggle.textContent = "🎙️";
      toggle.setAttribute("aria-label", "자막 시작");
      toggle.classList.remove("listening");
    }
  }

  toggle.addEventListener("click", function () {
    listening ? stop() : start();
  });

  // 글자 크기 스텝 버튼
  sizeDownBtn.addEventListener("click", function () { stepSize(-1); });
  sizeUpBtn.addEventListener("click", function () { stepSize(1); });

  // 새로고침: 페이지를 다시 불러옴(최신 버전 적용 + 화면도 비워짐).
  refreshBtn.addEventListener("click", function () {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (rs) {
        rs.forEach(function (r) { r.update(); });
      }).catch(function () {});
    }
    location.reload();
  });

  // ---- 화면 꺼짐 방지 ----
  var wakeLock = null;
  function requestWakeLock() {
    if ("wakeLock" in navigator) {
      navigator.wakeLock.request("screen").then(function (w) { wakeLock = w; }).catch(function(){});
    }
  }
  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release().catch(function(){}); wakeLock = null; }
  }
  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible" && listening) requestWakeLock();
  });

  updateButton();

  // PWA 서비스 워커 (오프라인 설치용)
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(function(){});
  }
})();
</script>
</body>
</html>
